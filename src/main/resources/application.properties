spring.application.name=CandidatMs4TWIN3
spring.cloud.config.enabled=true
spring.cloud.config.fail-fast=true
spring.config.import=optional:configserver:http://localhost:8099
server.port=8081
# H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2
# Datasource
spring.datasource.username=Oumeima
spring.datasource.password=
spring.datasource.url=jdbc:h2:file:./Database/Data/Candidat;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto = create
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka